<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 60" width="190" height="60">
  <!-- Quadrato nero -->
  <rect x="0" y="0" width="58" height="58" fill="#0f0e0c" rx="1"/>
  <!-- Bordo oro interno -->
  <rect x="3" y="3" width="52" height="52" fill="none" stroke="#b8952a" stroke-width="0.6" rx="1"/>
  <!-- Monogramma Ai -->
  <text x="29" y="41" text-anchor="middle" font-family="Georgia,serif" font-size="32" font-weight="700" fill="#b8952a">Ai</text>
  <!-- Punto bianco -->
  <circle cx="47" cy="9" r="4" fill="#f5f0e8"/>
  <!-- Linea oro base quadrato -->
  <line x1="0" y1="58" x2="58" y2="58" stroke="#b8952a" stroke-width="1.5"/>
  <!-- Testo L'Analista -->
  <text x="72" y="22" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#0f0e0c">L'Analista</text>
  <!-- Testo Imperfetto -->
  <text x="72" y="46" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#0f0e0c">Imperfetto</text>
  <!-- Linea oro sotto Imperfetto -->
  <line x1="72" y1="58" x2="184" y2="58" stroke="#b8952a" stroke-width="1.5"/>
</svg>
